name: Deploy StravaWrapped

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Adjust if your default AWS region is different

      - name: Terraform Init & Apply
        working-directory: ./infra
        env:
          # Passing your secrets securely to Terraform as environment variables
          TF_VAR_strava_client_id: ${{ secrets.STRAVA_CLIENT_ID }}
          TF_VAR_strava_client_secret: ${{ secrets.STRAVA_CLIENT_SECRET }}
          TF_VAR_domain_name: ${{ secrets.DOMAIN_NAME }}
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Build and Sync Frontend
        run: |
          chmod +x ./scripts/deploy.sh
          ./scripts/deploy.sh